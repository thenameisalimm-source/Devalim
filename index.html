<!DOCTYPE html>
<html>
<head>
    <title>Hacker Theme</title>
    <style>
        body {
            background: #000;
            color: #00ff00;
            font-family: "Courier New", monospace;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-shadow: 0 0 10px #00ff00;
        }

        .box {
            border: 1px solid #00ff00;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 10px #00ff00;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

<h1>ACCESS GRANTED <span class="blink">_</span></h1>

<div class="box">
    <p>Welcome to my hacker-themed website.</p>
    <p>System Status: ONLINE</p>
    <p>Connection: SECURE</p>
</div>

</body>
</html>
